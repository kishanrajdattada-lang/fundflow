<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FundFlow</title>
  <style>
    body {
      margin: 40px;
      background: #f6f7f9;
      color: #20242a;
      font-family: Arial, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
    }

    form,
    section {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      background: #ffffff;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
    }

    button {
      margin-top: 16px;
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      background: #106b56;
      color: #ffffff;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 12px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #d9dee7;
      text-align: left;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #edf0f4;
    }
  </style>
</head>
<body>
  <main>
    <h1>FundFlow</h1>
    <p>A very basic fund tracker connected to Postgres.</p>

    <form id="fund-form">
      <h2>Add Fund</h2>
      <label for="name">Name</label>
      <input id="name" name="name" required>

      <label for="amount">Amount</label>
      <input id="amount" name="amount" type="number" step="0.01" value="0">

      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="planned">Planned</option>
        <option value="active">Active</option>
        <option value="closed">Closed</option>
      </select>

      <button type="submit">Create fund</button>
    </form>

    <section>
      <h2>Funds</h2>
      <div id="funds">Loading funds...</div>
    </section>

    <section>
      <h2>API</h2>
      <p>Check database status at <code>/health</code>.</p>
      <p>List funds at <code>/api/funds</code>.</p>
    </section>
  </main>

  <script>
    const form = document.getElementById("fund-form");
    const fundsTarget = document.getElementById("funds");

    async function loadFunds() {
      try {
        const response = await fetch("/api/funds");
        const funds = await response.json();

        if (!response.ok) {
          fundsTarget.textContent = "Could not load funds.";
          return;
        }

        if (!funds.length) {
          fundsTarget.textContent = "No funds yet.";
          return;
        }

        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>Name</th><th>Amount</th><th>Status</th></tr></thead>";

        const body = document.createElement("tbody");
        funds.forEach((fund) => {
          const row = document.createElement("tr");
          [fund.name, Number(fund.amount).toFixed(2), fund.status].forEach((value) => {
            const cell = document.createElement("td");
            cell.textContent = value;
            row.appendChild(cell);
          });
          body.appendChild(row);
        });

        table.appendChild(body);
        fundsTarget.replaceChildren(table);
      } catch (error) {
        fundsTarget.textContent = error.message;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(form);

      await fetch("/api/funds", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: data.get("name"),
          amount: Number(data.get("amount")),
          status: data.get("status")
        })
      });

      form.reset();
      await loadFunds();
    });

    loadFunds();
  </script>
</body>
</html>
